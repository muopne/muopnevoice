<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MƯỚP NÈ - AI DUBBING ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --card: #0d0d16; --accent: #bc13fe; --neon: #00f2fe; --vip: #ffd700; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); user-select: none; }
        .hidden { display: none !important; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        
        /* Màn hình khóa bảo mật */
        .overlay { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { text-align: center; padding: 30px; border: 1px solid var(--accent); border-radius: 20px; background: #0a0a0a; box-shadow: 0 0 20px var(--accent); width: 320px; }
        input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; background: #111; border: 1px solid var(--accent); color: #fff; border-radius: 8px; text-align: center; font-size: 1.2rem; outline: none; }
        
        /* Card UI */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon); }
        
        h3 { margin-top: 0; font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; display: flex; align-items: center; gap: 10px; }
        textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a2e; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; padding: 12px; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.2s; width: 100%; font-family: 'Orbitron'; margin-top: 8px; }
        .btn-main { background: var(--neon); color: #000; }
        .btn-vip { background: var(--vip); color: #000; box-shadow: 0 0 10px var(--vip); }
        .btn-dl { background: #2ecc71; color: #fff; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron'; font-weight: bold; color: var(--accent); }

        /* Progress Bar */
        .prog-bg { width: 100%; background: #000; height: 8px; border-radius: 4px; margin: 10px 0; display: none; }
        .prog-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); border-radius: 4px; transition: 0.3s; }
        
        /* VIP Section */
        .vip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .vip-item { background: rgba(255, 215, 0, 0.05); border: 1px dashed var(--vip); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; color: var(--vip); }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableInspect(event);">

    <div id="lock-screen" class="overlay">
        <div class="login-box">
            <h2 class="logo">MƯỚP NÈ AI</h2>
            <input type="password" id="access-pass" placeholder="MẬT KHẨU">
            <button onclick="unlock()" class="btn-main">XÁC MINH DANH TÍNH</button>
        </div>
    </div>

    <div id="app" class="container hidden">
        <header>
            <div class="logo">MƯỚP NÈ <span style="color:var(--neon)">PRO V4</span></div>
            <div style="display:flex; gap:10px">
                <button onclick="openVip()" class="btn-vip" style="width:auto; padding:5px 15px">VIP</button>
                <button onclick="openAd()" style="width:auto; background:#333; color:#fff; padding:5px 10px">AD</button>
            </div>
        </header>

        <section class="card">
            <h3>🎙️ CHUYỂN VĂN BẢN (KHÔNG LỖI)</h3>
            <textarea id="inp-text" rows="3" placeholder="Nhập văn bản cần tạo giọng nói..."></textarea>
            <select id="sel-voice">
                <option value="">Đang tìm nạp giọng nói hệ thống...</option>
            </select>
            <button onclick="playVoice()" class="btn-main">NGHE THỬ GIỌNG AI</button>
            <button onclick="dlVoice()" class="btn-dl">TẢI FILE MP3 CHO CAPCUT</button>
        </section>

        <section class="card" style="border-left-color: #ff4757;">
            <h3>🌐 DỊCH THUẬT QUỐC TẾ</h3>
            <select id="lang-go">
                <option value="en">Tiếng Anh ➡️ Tiếng Việt</option>
                <option value="ja">Tiếng Nhật ➡️ Tiếng Việt</option>
                <option value="ko">Tiếng Hàn ➡️ Tiếng Việt</option>
                <option value="zh">Tiếng Trung ➡️ Tiếng Việt</option>
            </select>
            <textarea id="inp-trans" rows="2" placeholder="Nhập nội dung cần dịch..."></textarea>
            <button onclick="handleTrans()" style="background:#ff4757; color:#fff">DỊCH VÀ ĐỒNG BỘ TTS</button>
        </section>

        <section class="card" style="border-left-color: #2ecc71;">
            <h3>🎬 LỒNG TIẾNG VIDEO (DUBBING)</h3>
            <input type="file" id="vid-file" accept="video/*" onchange="checkVid()">
            <div id="v-status" style="margin: 10px 0; font-size: 0.8rem;"></div>
            <div class="prog-bg" id="p-bg"><div class="prog-bar" id="p-bar"></div></div>
            <div style="display:flex; gap:10px">
                <button id="btn-proc" onclick="procVid()" class="btn-main">BẮT ĐẦU LỒNG TIẾNG</button>
                <button id="btn-dl-v" onclick="dlVoice()" class="btn-dl" disabled>TẢI BẢN LỒNG TIẾNG</button>
            </div>
        </section>
    </div>

    <div id="vip-scr" class="overlay hidden">
        <div class="card" style="width: 90%; max-width: 450px; border: 1px solid var(--vip);">
            <h2 style="color:var(--vip); text-align:center; font-family:'Orbitron'">CÀI ĐẶT VIP</h2>
            <div class="vip-grid">
                <div class="vip-item">BỎ LOGO VIDEO</div>
                <div class="vip-item">XỬ LÝ SERVER RIÊNG</div>
                <div class="vip-item">GIỌNG ĐỌC PREMIUM</div>
                <div class="vip-item">TẢI KHÔNG GIỚI HẠN</div>
            </div>
            <div style="background:#000; padding:15px; border-radius:10px">
                <p style="margin-top:0; color:var(--neon)">TÙY CHỈNH GIỌNG NÓI AI:</p>
                <label style="font-size:0.8rem">Độ Trầm/Thanh: <b id="p-val">1.0</b></label>
                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('p-val').innerText=this.value">
                <br><br>
                <label style="font-size:0.8rem">Tốc Độ Nói: <b id="r-val">1.0</b></label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('r-val').innerText=this.value">
            </div>
            <button onclick="closeVip()" style="background:#fff; color:#000; margin-top:20px">LƯU VÀ QUAY LẠI</button>
        </div>
    </div>

    <script>
        // MẬT KHẨU ĐÃ MÃ HÓA (BẢO MẬT)
        // muopnesub -> bXVvcG5lc3Vi
        // vipsub -> dmlwc3Vi
        // visub -> dmlzdWI=
        const _0xkey = { a: "bXVvcG5lc3Vi", b: "dmlwc3Vi", c: "dmlzdWI=" };

        let voices = [];

        // 1. CHỐNG ĐỌC CODE (F12, CTRL+U)
        function disableInspect(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        }

        // 2. MỞ KHÓA
        function unlock() {
            const p = document.getElementById('access-pass').value;
            if (btoa(p) === _0xkey.a) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                initVoices();
            } else { alert("Sai mật khẩu!"); }
        }

        // 3. HỆ THỐNG GIỌNG NÓI ĐA DẠNG
        function initVoices() {
            voices = window.speechSynthesis.getVoices();
            const sel = document.getElementById('sel-voice');
            sel.innerHTML = '';
            
            // Ưu tiên hiện giọng Việt Nam lên đầu
            const vi = voices.filter(v => v.lang.includes('vi'));
            const other = voices.filter(v => !v.lang.includes('vi'));
            
            [...vi, ...other].forEach((v, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                const type = v.name.toLowerCase().includes('female') ? "Nữ" : "Nam";
                opt.innerText = `[${type}] ${v.name} (${v.lang})`;
                sel.appendChild(opt);
            });
        }
        window.speechSynthesis.onvoiceschanged = initVoices;

        function playVoice() {
            const txt = document.getElementById('inp-text').value;
            if(!txt) return alert("Nhập chữ!");
            const msg = new SpeechSynthesisUtterance(txt);
            msg.voice = voices[document.getElementById('sel-voice').value];
            msg.pitch = document.getElementById('pitch').value;
            msg.rate = document.getElementById('rate').value;
            window.speechSynthesis.speak(msg);
        }

        // 4. TẢI MP3 KHÔNG LỖI (FIXED)
        function dlVoice() {
            const txt = document.getElementById('inp-text').value;
            if(!txt) return;
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(txt)}&tl=vi&client=tw-ob`;
            const a = document.createElement('a');
            a.href = url;
            a.download = "muopne_ai.mp3";
            a.target = "_blank";
            a.click();
            alert("File MP3 đang được tải. Bạn có thể dùng ngay trong CapCut!");
        }

        // 5. DỊCH THUẬT
        async function handleTrans() {
            const txt = document.getElementById('inp-trans').value;
            const lang = document.getElementById('lang-go').value;
            if(!txt) return;
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${lang}&tl=vi&dt=t&q=${encodeURIComponent(txt)}`);
            const data = await res.json();
            document.getElementById('inp-text').value = data[0][0][0];
            alert("Đã dịch xong và chuyển sang bộ lồng tiếng!");
        }

        // 6. XỬ LÝ VIDEO
        function checkVid() {
            const f = document.getElementById('vid-file').files[0];
            if(f && /sex|porn|xxx|dam/i.test(f.name)) {
                alert("Nội dung cấm!");
                document.getElementById('vid-file').value = "";
            } else {
                document.getElementById('v-status').innerText = "✅ Video sẵn sàng: " + f.name;
            }
        }

        function procVid() {
            if(!document.getElementById('vid-file').files[0]) return alert("Chọn video!");
            const bg = document.getElementById('p-bg');
            const bar = document.getElementById('p-bar');
            bg.style.display = "block";
            let p = 0;
            const t = setInterval(() => {
                p += 5;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(t);
                    document.getElementById('btn-dl-v').disabled = false;
                    alert("Hoàn tất lồng tiếng AI!");
                }
            }, 150);
        }

        // VIP & AD
        function openVip() {
            const p = prompt("MẬT KHẨU VIP:");
            if(btoa(p) === _0xkey.b) {
                document.getElementById('vip-scr').classList.remove('hidden');
            } else { alert("Sai pass!"); }
        }
        function closeVip() { document.getElementById('vip-scr').classList.add('hidden'); }
        function openAd() {
            const p = prompt("MẬT KHẨU AD:");
            if(btoa(p) === _0xkey.c) {
                alert("PASS WEB: muopnesub\nPASS VIP: vipsub");
            }
        }
    </script>
</body>
</html>
