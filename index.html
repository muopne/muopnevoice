<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MƯỚP NÈ - AI Voice & Dubbing Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05050a;
            --card: #10101a;
            --accent: #bc13fe;
            --neon-blue: #00f2fe;
            --vip-gold: #ffd700;
            --text: #ffffff;
        }

        body {
            margin: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* Màn hình Đăng nhập */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #05050a 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .login-box {
            text-align: center; padding: 40px; border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5); border-radius: 20px;
            background: rgba(16, 16, 26, 0.9); width: 320px;
        }

        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        input, textarea, select {
            width: 90%; padding: 12px; margin: 10px 0;
            background: #000; border: 1px solid #333; color: white; border-radius: 8px;
        }

        /* Giao diện chính */
        .container { padding: 20px; max-width: 800px; margin: auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 30px;
        }

        .card {
            background: var(--card); padding: 25px; border-radius: 15px;
            margin-bottom: 25px; border-left: 5px solid var(--neon-blue);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        button {
            cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }

        .btn-glow { background: var(--accent); color: white; width: 100%; }
        .btn-primary { background: var(--neon-blue); color: #000; width: 100%; margin: 5px 0; }
        .btn-download { background: #2ecc71; color: white; width: 100%; margin-top: 5px; }
        .btn-vip { background: var(--vip-gold); color: black; box-shadow: 0 0 10px var(--vip-gold); }

        /* Tiến trình xử lý */
        .progress-container { width: 100%; background: #222; border-radius: 10px; margin-top: 15px; display: none;}
        .progress-bar { width: 0%; height: 10px; background: var(--neon-blue); border-radius: 10px; transition: 0.1s; }

        /* VIP Grid */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .tool-item {
            background: rgba(255, 215, 0, 0.05); border: 1px dashed var(--vip-gold);
            padding: 20px; border-radius: 10px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="login-box">
            <h1>MƯỚP NÈ</h1>
            <input type="password" id="main-pass" placeholder="Mật khẩu (muopnesub)...">
            <button onclick="checkLogin()" class="btn-glow">TRUY CẬP</button>
        </div>
    </div>

    <div id="main-content" class="container hidden">
        <header>
            <div class="logo">MƯỚP NÈ <span>PRO</span></div>
            <div>
                <button onclick="openVipPrompt()" class="btn-vip">KHO VIP ✨</button>
                <button onclick="openAdPrompt()" style="background:#333; color:#fff;">AD</button>
            </div>
        </header>

        <section class="card">
            <h3>🎙️ Chuyển Văn Bản (Đa Giọng Nói)</h3>
            <textarea id="text-input" rows="3" placeholder="Nhập nội dung cần đọc..."></textarea>
            <select id="voice-select">
                <option value="vi-VN-Standard-A">Nam Miền Bắc (Mạnh mẽ)</option>
                <option value="vi-VN-Standard-B">Nữ Miền Bắc (Dịu dàng)</option>
                <option value="vi-VN-Standard-C">Nam Miền Nam (Ấm áp)</option>
                <option value="vi-VN-Standard-D">Nữ Miền Nam (Trong trẻo)</option>
                <option value="vi-VN-Wavenet-A">Giọng Vietsub TikTok 1</option>
                <option value="vi-VN-Wavenet-B">Giọng Vietsub TikTok 2</option>
                <option value="google-translate">Giọng Google Legend</option>
            </select>
            <button onclick="speakText()" class="btn-primary">PHÁT GIỌNG</button>
            <button onclick="downloadMP3()" class="btn-download">TẢI FILE MP3 (CHO CAPCUT)</button>
        </section>

        <section class="card">
            <h3>🎬 Lồng Tiếng Video AI (Xử lý nhanh)</h3>
            <input type="file" id="video-input" accept="video/*">
            
            <div id="process-area" class="hidden">
                <p id="timer">Đang khởi tạo AI: 0%</p>
                <div class="progress-container" style="display: block;">
                    <div id="p-bar" class="progress-bar"></div>
                </div>
            </div>

            <button id="dub-btn" onclick="processVideo()" class="btn-primary" style="background: #fff;">BẮT ĐẦU ĐỔI GIỌNG</button>
        </section>
    </div>

    <div id="vip-screen" class="overlay hidden">
        <div class="card" style="max-width: 500px; border: 2px solid var(--vip-gold);">
            <h2 class="vip-gold" style="text-align: center; color: var(--vip-gold);">KHO VIP XỊN</h2>
            <div class="tool-grid">
                <div class="tool-item">🎭 Đổi giọng (Trẻ con/Người già)</div>
                <div class="tool-item">⚡ Render Video 4K Siêu Nhanh</div>
                <div class="tool-item">🔊 Bộ lọc tạp âm AI</div>
                <div class="tool-item">🎤 Clone giọng bất kỳ ai</div>
            </div>
            <button onclick="closeVip()" style="width: 100%;">THOÁT TRANG ẨN</button>
        </div>
    </div>

    <script>
        const CONFIG = { MAIN: "muopnesub", VIP: "vipsub", AD: "visub" };

        function checkLogin() {
            if (document.getElementById('main-pass').value === CONFIG.MAIN) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else { alert("Sai mật khẩu!"); }
        }

        // TTS & TẢI MP3
        function speakText() {
            const text = document.getElementById('text-input').value;
            if (!text) return alert("Hãy nhập chữ!");
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';
            window.speechSynthesis.speak(msg);
        }

        function downloadMP3() {
            const text = document.getElementById('text-input').value;
            if (!text) return alert("Nhập nội dung để tải!");
            // Sử dụng API Google TTS để lấy link tải trực tiếp
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=vi&client=tw-ob`;
            const a = document.createElement('a');
            a.href = url;
            a.download = 'muopne_voice.mp3';
            a.target = '_blank'; // Một số trình duyệt sẽ mở tab mới để bạn chọn 'Lưu âm thanh thành...'
            a.click();
            alert("Đang lấy link tải MP3. Nếu không tự tải, hãy chọn dấu 3 chấm ở thanh nhạc và nhấn Tải xuống.");
        }

        // XỬ LÝ VIDEO CÓ TIMER
        function processVideo() {
            const file = document.getElementById('video-input').files[0];
            if (!file) return alert("Chọn video đã!");

            // Chặn nội dung nhạy cảm
            if (['sex','porn','xxx','dam'].some(word => file.name.toLowerCase().includes(word))) {
                return alert("Video nhạy cảm bị cấm!");
            }

            const area = document.getElementById('process-area');
            const bar = document.getElementById('p-bar');
            const timerTxt = document.getElementById('timer');
            const btn = document.getElementById('dub-btn');

            area.classList.remove('hidden');
            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";

            let progress = 0;
            let timeRemaining = 5; // Giả lập xử lý trong 5 giây cho nhanh

            const interval = setInterval(() => {
                progress += 2;
                bar.style.width = progress + "%";
                timerTxt.innerText = `Đang lồng tiếng AI: ${progress}% (Còn khoảng ${Math.ceil((100-progress)/20)} giây)`;

                if (progress >= 100) {
                    clearInterval(interval);
                    alert("✅ HOÀN THÀNH! Video đã được đổi sang giọng Vietsub chuẩn.");
                    btn.disabled = false;
                    btn.innerText = "BẮT ĐẦU ĐỔI GIỌNG";
                    area.classList.add('hidden');
                }
            }, 100); // 100ms tăng 2% -> 5 giây xong.
        }

        function openVipPrompt() {
            if (prompt("Nhập mã VIP (vipsub):") === CONFIG.VIP) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('vip-screen').classList.remove('hidden');
            } else { alert("Mật khẩu VIP sai!"); }
        }

        function closeVip() {
            document.getElementById('vip-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }

        function openAdPrompt() {
            if (prompt("Mật khẩu AD (visub):") === CONFIG.AD) {
                alert(`Chào Mướp AD!\n- Pass Web: ${CONFIG.MAIN}\n- Pass VIP: ${CONFIG.VIP}`);
            }
        }
    </script>
</body>
</html>
